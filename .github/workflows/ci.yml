name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.29"
      - run: uv sync --frozen
      - run: uv run pytest tests/ -v --tb=short

  react-typecheck:
    name: React type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/react/package-lock.json
      - run: npm ci
        working-directory: frontend/react
      - run: npx tsc --noEmit
        working-directory: frontend/react

  docker-smoke:
    name: Docker build smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.backend -t sangam-backend:ci .
      - run: docker build -f Dockerfile.react -t sangam-frontend:ci .
      - run: docker compose config --quiet
