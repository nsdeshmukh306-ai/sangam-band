# GCP Cloud Build — CI/CD pipeline for Sangam
# Trigger: push to main branch
# Usage: gcloud builds submit --project=[YOUR_GCP_PROJECT]
#
# Required substitutions (set in Cloud Build trigger UI):
#   _GCP_PROJECT  — GCP project ID
#   _BACKEND_URL  — Cloud Run backend URL (for VITE_API_URL build arg)
#   _REGION       — Cloud Run region (e.g. asia-south1)

steps:
  - name: "python:3.12-slim"
    id: python-tests
    entrypoint: bash
    args:
      - -c
      - "pip install uv -q && uv sync --frozen && uv run pytest tests/ -v --tb=short"

  - name: "node:20-alpine"
    id: react-typecheck
    dir: frontend/react
    entrypoint: sh
    args:
      - -c
      - "npm ci && npx tsc --noEmit"

  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args: [build, -f, Dockerfile.backend,
           -t, "gcr.io/${_GCP_PROJECT}/sangam-backend:$COMMIT_SHA",
           -t, "gcr.io/${_GCP_PROJECT}/sangam-backend:latest", .]
    waitFor: [python-tests]

  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    args: [build, -f, Dockerfile.react,
           --build-arg, "VITE_API_URL=${_BACKEND_URL}",
           -t, "gcr.io/${_GCP_PROJECT}/sangam-frontend:$COMMIT_SHA",
           -t, "gcr.io/${_GCP_PROJECT}/sangam-frontend:latest", .]
    waitFor: [react-typecheck]

  - name: "gcr.io/cloud-builders/docker"
    args: [push, "gcr.io/${_GCP_PROJECT}/sangam-backend", --all-tags]
    waitFor: [build-backend]

  - name: "gcr.io/cloud-builders/docker"
    args: [push, "gcr.io/${_GCP_PROJECT}/sangam-frontend", --all-tags]
    waitFor: [build-frontend]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    entrypoint: gcloud
    args: [run, deploy, sangam-backend,
           "--image=gcr.io/${_GCP_PROJECT}/sangam-backend:$COMMIT_SHA",
           "--region=${_REGION}", "--project=${_GCP_PROJECT}",
           --platform=managed, --no-traffic]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-frontend
    entrypoint: gcloud
    args: [run, deploy, sangam-frontend,
           "--image=gcr.io/${_GCP_PROJECT}/sangam-frontend:$COMMIT_SHA",
           "--region=${_REGION}", "--project=${_GCP_PROJECT}",
           --platform=managed, --no-traffic]

images:
  - "gcr.io/${_GCP_PROJECT}/sangam-backend:$COMMIT_SHA"
  - "gcr.io/${_GCP_PROJECT}/sangam-frontend:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
